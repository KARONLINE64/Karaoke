<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catalogue Karaoké</title>

<style>

body{
margin:0;
background:#111;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

header{
background:#000;
padding:30px;
text-align:center;
box-shadow:0 0 20px rgba(255,215,0,.25);
}

h1{
margin:0;
color:gold;
font-size:42px;
}

p{
color:#ddd;
}

input{

width:90%;
max-width:700px;

padding:18px;

font-size:22px;

border-radius:50px;

border:none;

outline:none;

margin-top:30px;

}

#resultats{

width:90%;

max-width:900px;

margin:auto;

margin-top:40px;

}

.carte{

background:#1d1d1d;

padding:20px;

margin-bottom:12px;

border-radius:15px;

border-left:5px solid gold;

}

.numero{

font-size:14px;

color:gold;

}

.artiste{

font-size:22px;

font-weight:bold;

}

.titre{

color:#ccc;

}

</style>

</head>

<body>

<header>

<h1>🎤 FLORIBAR</h1>

<p>Catalogue Karaoké</p>

<input placeholder="Rechercher un artiste ou un titre...">

</header>

<div id="resultats">

<div class="carte">

<div class="numero">12548</div>

<div class="artiste">Adele</div>

<div class="titre">Hello</div>

</div>

<div class="carte">

<div class="numero">12549</div>

<div class="artiste">ABBA</div>

<div class="titre">Dancing Queen</div>

</div>

<div class="carte">

<div class="numero">12550</div>

<div class="artiste">Queen</div>

<div class="titre">Bohemian Rhapsody</div>

</div>

</div>

</body>

</html>
